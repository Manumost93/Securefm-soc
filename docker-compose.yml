services:

  # ============================================================
  # PostgreSQL — Base de datos principal
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: securefm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sfm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sfm_password}
      POSTGRES_DB: ${POSTGRES_DB:-securefm_soc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sfm_user} -d ${POSTGRES_DB:-securefm_soc}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================================
  # Backend — API Node.js/Express
  # Espera a que PostgreSQL esté listo (healthcheck)
  # El entrypoint ejecuta migraciones antes de arrancar
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securefm-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-sfm_user}:${POSTGRES_PASSWORD:-sfm_password}@postgres:5432/${POSTGRES_DB:-securefm_soc}?schema=public
      JWT_SECRET: ${JWT_SECRET:?Error: JWT_SECRET es obligatorio. Defínelo en el archivo .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      FRONTEND_URL: http://localhost
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  # ============================================================
  # Frontend — React servido por Nginx
  # Nginx también proxea /api al backend (sin CORS entre contenedores)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: securefm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: securefm-postgres-data
