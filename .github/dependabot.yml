version: 2

updates:
  # ── Backend (Node.js) ──────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"
      include: scope
    # Agrupar actualizaciones de desarrollo para menos ruido
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "@types/*"
          - "eslint*"
          - "@typescript-eslint/*"
          - "ts-*"
          - "jest*"
          - "@jest/*"

  # ── Frontend (Node.js) ────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "@types/*"
          - "@vitejs/*"
          - "eslint*"
          - "@typescript-eslint/*"

  # ── GitHub Actions ────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Europe/Madrid"
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"

  # ── Docker ────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
